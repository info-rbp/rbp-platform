name: Frontend Quality Gate

on:
  pull_request:
    paths:
      - "frontend/portal/**"
      - ".github/workflows/frontend-quality-gate.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "frontend/portal/**"
      - ".github/workflows/frontend-quality-gate.yml"

jobs:
  frontend-quality-gate:
    name: Frontend quality gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Route smoke
        run: npm run route:smoke

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
