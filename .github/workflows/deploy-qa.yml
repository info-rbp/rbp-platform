name: Deploy QA

on:
  workflow_dispatch:
  push:
    branches:
      - qa

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/portal/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run audit:seo

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/portal/dist

  deploy:
    needs: build-frontend
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy placeholder
        run: |
          echo "Deploy dist/ to QA host using rsync, S3, Netlify, Vercel, or the selected host."
