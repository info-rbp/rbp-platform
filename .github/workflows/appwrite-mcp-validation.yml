name: Appwrite MCP Validation

on:
  pull_request:
    paths:
      - "mcp/appwrite/**"
      - ".github/workflows/appwrite-mcp-validation.yml"
  push:
    branches:
      - main
      - qa
      - "launch/**"
    paths:
      - "mcp/appwrite/**"
      - ".github/workflows/appwrite-mcp-validation.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/appwrite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp/appwrite/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
