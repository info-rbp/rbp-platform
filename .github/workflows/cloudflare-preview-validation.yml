name: Cloudflare Preview Validation

on:
  pull_request:
    branches: [main]

jobs:
  cloudflare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run cloudflare:env:validate
      - run: cd frontend/portal && npm ci && npm run build && npm run audit:seo