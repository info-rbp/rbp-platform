name: Cloudflare Preview Validation

on:
  pull_request:
    branches: [main]

jobs:
  cloudflare:
    runs-on: ubuntu-latest

    env:
      VITE_BACKEND_PROVIDER: appwrite
      VITE_QA_ENVIRONMENT: "true"
      VITE_CLOUDFLARE_ENVIRONMENT: qa
      VITE_PUBLIC_SITE_URL: https://preview.example.invalid
      VITE_API_BASE_URL: https://api.example.invalid
      VITE_APPWRITE_ENDPOINT: https://appwrite.example.invalid/v1
      VITE_APPWRITE_PROJECT_ID: pr-preview-project
      VITE_APPWRITE_DATABASE_ID: rbp_platform
      VITE_APPWRITE_STORAGE_BUCKET_ID: rbp_documents
      VITE_ENABLE_APPWRITE_AUTH: "true"
      VITE_ENABLE_APPWRITE_DATABASE: "true"
      VITE_ENABLE_APPWRITE_STORAGE: "true"
      VITE_ENABLE_APPWRITE_FUNCTIONS: "true"
      VITE_ENABLE_MOCK_AUTH: "false"
      VITE_ENABLE_MOCK_FALLBACK: "false"
      VITE_ENABLE_APPLICATIONS: "false"
      VITE_ENABLE_APPLICATION_INTEREST: "true"
      VITE_ENABLE_APPLICATION_PROVISIONING: "false"
      VITE_ENABLE_ADMIN_APPLICATIONS: "true"
      VITE_ENABLE_STRIPE_CHECKOUT: "true"
      VITE_ENABLE_EMAIL_NOTIFICATIONS: "true"
      VITE_EMAIL_SANDBOX_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run cloudflare:env:validate

      - run: cd frontend/portal && npm ci && npm run build && npm run audit:seo
