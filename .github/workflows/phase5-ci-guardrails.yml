name: Phase 5 CI Guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: phase5-ci-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-guardrails:
    name: Repository guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run repository guardrails
        run: bash scripts/ci/check_repository_guardrails.sh

      - name: Run Phase 5 static smoke tests
        run: bash scripts/ci/phase5_static_smoke.sh

  frontend-build:
    name: Frontend install and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/portal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-syntax:
    name: Backend Python syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile rbp_app source
        run: bash scripts/ci/check_backend_syntax.sh
