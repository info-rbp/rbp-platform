name: QA Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: qa

    env:
      APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
      APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
      APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
      APPWRITE_DATABASE_ID: ${{ vars.APPWRITE_DATABASE_ID }}
      APPWRITE_STORAGE_BUCKET_ID: ${{ vars.APPWRITE_STORAGE_BUCKET_ID }}
      APPWRITE_ADMIN_TEAM_ID: ${{ vars.APPWRITE_ADMIN_TEAM_ID }}
      APPWRITE_ENVIRONMENT: ${{ vars.APPWRITE_ENVIRONMENT }}

      VITE_BACKEND_PROVIDER: ${{ vars.VITE_BACKEND_PROVIDER }}
      VITE_APPWRITE_ENDPOINT: ${{ vars.VITE_APPWRITE_ENDPOINT }}
      VITE_APPWRITE_PROJECT_ID: ${{ vars.VITE_APPWRITE_PROJECT_ID }}
      VITE_APPWRITE_DATABASE_ID: ${{ vars.VITE_APPWRITE_DATABASE_ID }}
      VITE_APPWRITE_STORAGE_BUCKET_ID: ${{ vars.VITE_APPWRITE_STORAGE_BUCKET_ID }}
      VITE_ENABLE_MOCK_AUTH: ${{ vars.VITE_ENABLE_MOCK_AUTH }}
      VITE_ENABLE_MOCK_FALLBACK: ${{ vars.VITE_ENABLE_MOCK_FALLBACK }}
      VITE_QA_ENVIRONMENT: ${{ vars.VITE_QA_ENVIRONMENT }}
      VITE_CLOUDFLARE_ENVIRONMENT: ${{ vars.VITE_CLOUDFLARE_ENVIRONMENT }}

      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_DEFAULT_CURRENCY: ${{ vars.STRIPE_DEFAULT_CURRENCY }}
      STRIPE_SUCCESS_URL: ${{ vars.STRIPE_SUCCESS_URL }}
      STRIPE_CANCEL_URL: ${{ vars.STRIPE_CANCEL_URL }}

      QA_SMOKE_EXECUTE: ${{ vars.QA_SMOKE_EXECUTE }}
      QA_SMOKE_USER_EMAIL: ${{ secrets.QA_SMOKE_USER_EMAIL }}
      QA_SMOKE_USER_PASSWORD: ${{ secrets.QA_SMOKE_USER_PASSWORD }}
      QA_SMOKE_USER_ID: ${{ vars.QA_SMOKE_USER_ID }}
      QA_SMOKE_ADMIN_USER_ID: ${{ vars.QA_SMOKE_ADMIN_USER_ID }}
      QA_SMOKE_TENANT_ID: ${{ vars.QA_SMOKE_TENANT_ID }}
      QA_SMOKE_PLAN_CODE: ${{ vars.QA_SMOKE_PLAN_CODE }}
      QA_SMOKE_SERVICE_TYPE: ${{ vars.QA_SMOKE_SERVICE_TYPE }}
      RBP_INTERNAL_FUNCTION_TOKEN: ${{ secrets.RBP_INTERNAL_FUNCTION_TOKEN }}
      APPWRITE_TRUSTED_FUNCTION_TOKEN: ${{ secrets.APPWRITE_TRUSTED_FUNCTION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run appwrite:seed:validate

      - run: npm run test:smoke:dry-run

      - name: Run QA smoke checks
        run: |
          args=""
          if [ "${QA_SMOKE_EXECUTE}" = "true" ]; then
            args="-- --execute"
          fi
          npm run smoke:qa:auth $args
          npm run smoke:qa:billing $args
          npm run smoke:qa:stripe-webhook $args
          npm run smoke:qa:service-requests $args
          npm run smoke:qa:admin $args
          npm run smoke:qa:permissions $args
      - run: npm run smoke:qa:auth

      - run: npm run smoke:qa:billing

      - run: npm run smoke:qa:stripe-webhook

      - run: npm run smoke:qa:service-requests

      - run: npm run smoke:qa:admin

      - run: npm run smoke:qa:permissions
