name: Appwrite Schema Validation

on:
  pull_request:
    branches: [main]

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run appwrite:schema:validate
      - run: npm run appwrite:permissions:validate
