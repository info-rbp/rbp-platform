name: Deploy Appwrite QA

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run appwrite:schema:deploy -- --apply
      - run: npm run appwrite:functions:deploy -- --apply
      - run: npm run appwrite:seed:qa -- --apply
