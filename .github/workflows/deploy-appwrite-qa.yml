name: Deploy Appwrite QA

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa

    env:
      APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
      APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
      APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
      APPWRITE_DATABASE_ID: ${{ vars.APPWRITE_DATABASE_ID }}
      APPWRITE_STORAGE_BUCKET_ID: ${{ vars.APPWRITE_STORAGE_BUCKET_ID }}
      APPWRITE_ADMIN_TEAM_ID: ${{ vars.APPWRITE_ADMIN_TEAM_ID }}
      APPWRITE_ENVIRONMENT: ${{ vars.APPWRITE_ENVIRONMENT }}

      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_DEFAULT_CURRENCY: ${{ vars.STRIPE_DEFAULT_CURRENCY }}
      STRIPE_SUCCESS_URL: ${{ vars.STRIPE_SUCCESS_URL }}
      STRIPE_CANCEL_URL: ${{ vars.STRIPE_CANCEL_URL }}

      VITE_BACKEND_PROVIDER: ${{ vars.VITE_BACKEND_PROVIDER }}
      VITE_APPWRITE_ENDPOINT: ${{ vars.VITE_APPWRITE_ENDPOINT }}
      VITE_APPWRITE_PROJECT_ID: ${{ vars.VITE_APPWRITE_PROJECT_ID }}
      VITE_APPWRITE_DATABASE_ID: ${{ vars.VITE_APPWRITE_DATABASE_ID }}
      VITE_APPWRITE_STORAGE_BUCKET_ID: ${{ vars.VITE_APPWRITE_STORAGE_BUCKET_ID }}
      VITE_ENABLE_MOCK_AUTH: ${{ vars.VITE_ENABLE_MOCK_AUTH }}
      VITE_ENABLE_MOCK_FALLBACK: ${{ vars.VITE_ENABLE_MOCK_FALLBACK }}
      VITE_QA_ENVIRONMENT: ${{ vars.VITE_QA_ENVIRONMENT }}
      VITE_CLOUDFLARE_ENVIRONMENT: ${{ vars.VITE_CLOUDFLARE_ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run appwrite:schema:deploy -- --apply
      - name: Prepare Appwrite Functions deployment manifest
        run: npm run appwrite:functions:deploy -- --apply
        continue-on-error: true

      - run: npm run appwrite:seed:qa -- --apply