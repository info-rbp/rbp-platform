name: Appwrite Functions Validation

on:
  pull_request:
    branches: [main]

jobs:
  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run appwrite:functions:validate